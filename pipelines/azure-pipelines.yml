trigger: none
pr: none

parameters:
  - name: environment
    displayName: 'Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - staging
      - prod

  - name: action
    displayName: 'Action'
    type: string
    default: 'apply'
    values:
      - apply
      - destroy

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: 'New variable group 24-Jun'
  - name: terraformWorkingDirectory
    value: '$(System.DefaultWorkingDirectory)/terraform'
  - name: backendResourceGroup
    value: '$(BACKEND_RESOURCE_GROUP)'
  - name: backendStorageAccount
    value: '$(BACKEND_STORAGE_ACCOUNT)'
  - name: backendContainer
    value: '$(BACKEND_CONTAINER)'
  - name: backendKey
    value: 'terraform-${{ parameters.environment }}.tfstate'
  - name: terraformVersion
    value: '1.5.0'
  - name: environment
    value: '${{ parameters.environment }}'
  - name: tfvarsFile
    value: 'env/${{ parameters.environment }}/${{ parameters.environment }}.tfvars'

stages:
  # Stage 1: Validate and Format Check
  - stage: Validate
    displayName: 'Terraform Validate & Format'
    jobs:
      - job: ValidateFormat
        displayName: 'Validate Terraform Configuration'
        steps:
          - checkout: self
          - template: templates/terraform-steps.yml
            parameters:
              step: 'validate'
              action: '${{ parameters.action }}'
              tfvarsFile: '${{ variables.tfvarsFile }}'

  # Stage 2: Plan
  - stage: Plan
    displayName: 'Terraform Plan'
    dependsOn: Validate
    condition: succeeded()
    jobs:
      - job: TerraformPlan
        displayName: 'Create Terraform Plan'
        steps:
          - checkout: self
          - template: templates/terraform-steps.yml
            parameters:
              step: 'plan'
              action: '${{ parameters.action }}'
              tfvarsFile: '${{ variables.tfvarsFile }}'

  # Stage 3: Apply or Destroy
  - stage: Apply
    displayName: 'Terraform ${{ parameters.action }}'
    dependsOn: Plan
    condition: succeeded()
    jobs:
      - deployment: TerraformApply
        displayName: 'Run Terraform ${{ parameters.action }}'
        environment: 'Azure-${{ parameters.environment }}'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - template: templates/terraform-steps.yml
                  parameters:
                    step: '${{ parameters.action }}'
                    tfvarsFile: '${{ variables.tfvarsFile }}'
                - ${{ if eq(parameters.action, 'apply') }}:
                  - script: |
                      echo "Terraform Apply completed successfully"
                      echo "Retrieving VM outputs..."
                      VM_PUBLIC_IP=$(terraform output -raw vm_public_ip)
                      VM_ADMIN_USERNAME=$(terraform output -raw vm_admin_username)
                      echo "##vso[task.setvariable variable=VM_PUBLIC_IP;isOutput=true]${VM_PUBLIC_IP}"
                      echo "##vso[task.setvariable variable=VM_ADMIN_USERNAME;isOutput=true]${VM_ADMIN_USERNAME}"
                      echo "VM Public IP: ${VM_PUBLIC_IP}"
                      echo "VM Admin Username: ${VM_ADMIN_USERNAME}"
                    workingDirectory: $(terraformWorkingDirectory)
                    displayName: 'Extract Terraform Outputs'
                    name: tfOutputs
                    env:
                      ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
                      ARM_CLIENT_ID: $(ARM_CLIENT_ID)
                      ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
                      ARM_TENANT_ID: $(ARM_TENANT_ID)

  # Stage 4: VM Health Check (only runs on apply, never on destroy)
  - stage: VMHealthCheck
    displayName: 'VM Health Check'
    dependsOn: Apply
    condition: and(succeeded(), eq('${{ parameters.action }}', 'apply'))
    jobs:
      - template: templates/vm-health-check.yml
        parameters:
          vmPublicIp: '$[ stageDependencies.Apply.TerraformApply.outputs[''TerraformApply.tfOutputs.VM_PUBLIC_IP''] ]'
          vmAdminUsername: '$[ stageDependencies.Apply.TerraformApply.outputs[''TerraformApply.tfOutputs.VM_ADMIN_USERNAME''] ]'