parameters:
  - name: step
    type: string
    values:
      - validate
      - plan
      - apply
      - destroy
  - name: tfvarsFile
    type: string
    default: 'env/dev/dev.tfvars'

steps:
  # ... (keep Debug, Install Terraform, SSH download/configure steps as-is) ...

  # Terraform Init (no change needed except it already handles validate vs not)

  # Terraform Plan — only for plan step with apply action, or plan with destroy (shows what will be destroyed)
  - script: |
      cd $(terraformWorkingDirectory)
      terraform plan \
        -var-file="${{ parameters.tfvarsFile }}" \
        -var="subscription_id=$ARM_SUBSCRIPTION_ID" \
        -var="public_key_path=$HOME/.ssh/id_rsa.pub" \
        -no-color \
        -out=tfplan
    displayName: 'Terraform Plan'
    condition: and(eq('${{ parameters.step }}', 'plan'), ne('${{ parameters.action }}', 'destroy'))
    env:
      ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
      ARM_CLIENT_ID: $(ARM_CLIENT_ID)
      ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
      ARM_TENANT_ID: $(ARM_TENANT_ID)

  # Terraform Plan Destroy
  - script: |
      cd $(terraformWorkingDirectory)
      terraform plan \
        -destroy \
        -var-file="${{ parameters.tfvarsFile }}" \
        -var="subscription_id=$ARM_SUBSCRIPTION_ID" \
        -var="public_key_path=$HOME/.ssh/id_rsa.pub" \
        -no-color \
        -out=tfplan
    displayName: 'Terraform Plan (Destroy)'
    condition: and(eq('${{ parameters.step }}', 'plan'), eq('${{ parameters.action }}', 'destroy'))
    env:
      ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
      ARM_CLIENT_ID: $(ARM_CLIENT_ID)
      ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
      ARM_TENANT_ID: $(ARM_TENANT_ID)

  # Terraform Apply
  - script: |
      cd $(terraformWorkingDirectory)
      terraform apply -no-color -auto-approve tfplan
    displayName: 'Terraform Apply'
    condition: eq('${{ parameters.step }}', 'apply')
    env:
      ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
      ARM_CLIENT_ID: $(ARM_CLIENT_ID)
      ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
      ARM_TENANT_ID: $(ARM_TENANT_ID)

  # Terraform Destroy
  - script: |
      cd $(terraformWorkingDirectory)
      terraform apply -no-color -auto-approve tfplan
    displayName: 'Terraform Destroy (apply destroy-plan)'
    condition: eq('${{ parameters.step }}', 'destroy')
    env:
      ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
      ARM_CLIENT_ID: $(ARM_CLIENT_ID)
      ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
      ARM_TENANT_ID: $(ARM_TENANT_ID)

  # ... (Export outputs / Publish artifacts only when step == 'apply', condition unchanged) ...